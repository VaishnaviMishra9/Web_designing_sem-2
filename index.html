<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFS No Limits UI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="top-nav">
            <div class="currency-group">
                <div class="currency fuel"><span>⛽ 10/10</span></div>
                <div class="currency cash"><span>$ 1,240,500</span></div>
                <div class="currency gold"><span>💎 450</span></div>
            </div>
            <div class="player-profile">
                <span class="level">LVL 85</span>
                <div class="xp-bar"><div class="xp-fill"></div></div>
            </div>
        </header>

        <main class="dashboard">
            <div class="car-preview">
                <div class="pr-badge">
                    <span class="label">PR</span>
                    <span class="value">842</span>
                </div>
                <h1 class="car-title">NISSAN GT-R (R35)</h1>
            </div>

            <div class="menu-shards">
                <div class="shard active">
                    <div class="shard-content">CAMPAIGN</div>
                </div>
                <div class="shard">
                    <div class="shard-content">CAR SERIES</div>
                </div>
                <div class="shard">
                    <div class="shard-content">MODSHOP</div>
                </div>
                <div class="shard special">
                    <div class="shard-content">SPECIAL EVENTS</div>
                </div>
            </div>
        </main>

        <footer class="bottom-actions">
            <button class="btn-back">⬅</button>
            <div class="crate-notify">NEW CRATES AVAILABLE!</div>
            <button class="btn-race">RACE</button>
        </footer>
    </div>
</body>
</html>
